schema: ptr-contract/v1
id: stat-card
category: molecule
status: draft
version: 0.1.0

description: >
  A metric display card for dashboards. Shows a single key value with optional
  trend indicator and contextual icon. One metric per card — never two values
  in the same card. Trend color is contextual: use positive=false for metrics
  where an increase is bad (errors, losses, timeouts).

dom:
  element: article
  notes: >
    Uses <article> — a stat card is a self-contained piece of content.
    Screen readers can navigate by article landmark.

props:
  label:
    type: string
    required: true
    notes: Metric name. Keep short — 1-3 words. "Season points" not "Total season points accumulated".

  value:
    type: string | number
    required: true
    notes: >
      The metric value. Format before passing — "2,840" not 2840.
      "#1" for rank. "81%" for percentages. Use tabular numerals
      (Inter handles this automatically via font-variant-numeric).

  trend:
    type: StatCardTrend
    required: false
    notes: >
      Optional trend indicator. Auto-generates accessible aria-label.
      Omit when trend context is not available or not meaningful.
    shape:
      direction:
        type: enum
        values: [up, down, neutral]
        notes: Direction of change. Controls arrow icon and color (with positive).
      value:
        type: string
        notes: Formatted delta string. "+124", "−3%", "No change". Include sign.
      label:
        type: string
        required: false
        notes: Period context. "vs last month", "this season". Keep short.
      positive:
        type: boolean
        default: true
        notes: >
          Whether up direction is good or bad.
          true (default): up = success color, down = error color.
          false (inverse): up = error color, down = success color.
          Use false for metrics where increase is bad: errors, losses, timeouts.

  icon:
    type: ReactNode
    required: false
    notes: >
      Visual identifier for the metric. Rendered in branded icon wrap.
      Decorative by default (aria-hidden). Provide iconLabel to make informative.
      Keep to 16x16 SVG icons. Use brand accent colors via currentColor.

  iconLabel:
    type: string
    required: false
    notes: >
      Accessible label for the icon. When provided, icon wrap gets role="img"
      and aria-label. Use when the icon conveys meaning not in the label.
      Usually not needed — the label text is sufficient context.

  loading:
    type: boolean
    default: false
    notes: >
      Shows skeleton animation in place of value. Hides trend.
      Label remains visible to prevent layout shift.
      Use while data is fetching.

states:
  default: Label + value + optional trend + optional icon.
  loading: Skeleton replaces value. Trend hidden. Label visible.

tokens:
  card:
    background: var(--ptr-color-bg-surface)
    border: var(--ptr-border-hairline) solid var(--ptr-color-border-subtle)
    border-radius: var(--ptr-radius-lg)
    padding: var(--ptr-spacing-sm)
  label:
    font-size: var(--ptr-typography-size-sm)
    color: var(--ptr-color-text-secondary)
  value:
    font-size: var(--ptr-typography-size-2xl)
    font-weight: var(--ptr-typography-weight-label)
    color: var(--ptr-color-text-primary)
    font-variant-numeric: tabular-nums
  icon-wrap:
    background: var(--ptr-color-brand-primary-tint)
    color: var(--ptr-color-brand-primary-text)
    border-radius: var(--ptr-radius-md)
    size: 32x32px
  trend:
    positive: var(--ptr-color-text-success)
    negative: var(--ptr-color-text-error)
    neutral: var(--ptr-color-text-secondary)

accessibility:
  landmark: article — navigable by screen readers
  icon: >
    aria-hidden by default. Provide iconLabel to make informative.
    Most icons are decorative — the metric label provides sufficient context.
  trend: >
    aria-label auto-generated from direction + value + label.
    Individual trend spans (arrow, value, period) are aria-hidden.
    Screen reader announces full trend meaning, not individual fragments.
    Example: "Up +124 vs last month"
  loading: >
    Skeleton element is aria-hidden. Label remains visible.
    Screen reader announces the label; value not yet available.

composition:
  contains:
    - Label text (required)
    - Value text (required, hidden when loading)
    - Trend indicator (optional)
    - Icon in icon wrap (optional)

  contained_by:
    - Dashboard layouts
    - Grid containers (typically 2-4 column)
    - Player profile organism
    - Any surface that needs metric display

  never_contains:
    - Multiple metrics (one card, one metric)
    - Interactive elements (StatCard is display-only)
    - Charts or sparklines (future: StatCard with sparkline variant)

patterns:
  - id: dashboard-grid
    description: 2×2 or 4-column grid of stat cards
    example: |
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px' }}>
        <StatCard
          label="Season points"
          value="2,840"
          trend={{ direction: 'up', value: '+124', label: 'vs last month' }}
          icon={<TrophyIcon />}
        />
        <StatCard
          label="Win rate"
          value="81%"
          trend={{ direction: 'down', value: '−3%', label: 'vs last month' }}
          icon={<CheckIcon />}
        />
        <StatCard
          label="Current rank"
          value="#1"
          trend={{ direction: 'neutral', value: 'No change' }}
          icon={<ChartIcon />}
        />
        <StatCard
          label="Matches played"
          value="22"
          trend={{ direction: 'up', value: '+4', label: 'this season' }}
          icon={<ClockIcon />}
        />
      </div>

  - id: loading-grid
    description: Skeleton grid while data fetches
    example: |
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px' }}>
        <StatCard label="Season points" value="" loading />
        <StatCard label="Win rate" value="" loading />
        <StatCard label="Current rank" value="" loading />
        <StatCard label="Matches played" value="" loading />
      </div>
    notes: Labels visible during loading prevents layout shift when data arrives.

  - id: inverse-trend
    description: Metric where up is bad
    example: |
      <StatCard
        label="Errors this month"
        value="3"
        trend={{ direction: 'up', value: '+2', label: 'vs last month', positive: false }}
      />

anti_patterns:
  - id: two-metrics
    description: Putting two metrics in one card
    wrong: |
      <StatCard label="Points / Rank" value="2,840 / #1" />
    right: |
      <StatCard label="Season points" value="2,840" />
      <StatCard label="Current rank" value="#1" />
    reason: One card, one metric. Two values create ambiguity and break the visual hierarchy.

  - id: unformatted-number
    description: Passing raw numbers without formatting
    wrong: <StatCard label="Points" value={2840} />
    right: <StatCard label="Points" value="2,840" />
    reason: >
      Raw numbers lack formatting and look wrong at large sizes.
      Format before passing — commas, units, prefixes, symbols.

  - id: interactive-card
    description: Adding onClick to StatCard
    wrong: <StatCard label="Points" value="2,840" onClick={handleClick} />
    right: >
      Wrap in a link or button if navigation is needed.
      StatCard is display-only — interactivity belongs in a wrapper.
    reason: StatCard has no keyboard semantics for interaction.

  - id: missing-positive-false
    description: Forgetting positive=false for inverse metrics
    wrong: |
      <StatCard
        label="Errors"
        value="12"
        trend={{ direction: 'up', value: '+5' }}
      />
    right: |
      <StatCard
        label="Errors"
        value="12"
        trend={{ direction: 'up', value: '+5', positive: false }}
      />
    reason: >
      Without positive=false, an increase in errors shows as green (success).
      Always set positive=false for metrics where increase is bad.

related:
  - id: badge
    when_to_use: Small inline status labels — use alongside StatCard for status indicators.

  - id: data-table
    status: planned
    when_to_use: >
      Detailed tabular data — rankings, full leaderboard.
      StatCard is for summary metrics; DataTable is for detailed records.

  - id: leaderboard
    category: organism
    status: planned
    when_to_use: >
      Full ranked list of players. Leaderboard composes StatCard
      (summary row) with DataTable (full ranking).
