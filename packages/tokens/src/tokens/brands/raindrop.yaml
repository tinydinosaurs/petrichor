# =============================================================================
# PETRICHOR DESIGN SYSTEM — BRAND: RAINDROP
# =============================================================================
# Brand token overrides for the Raindrop brand.
# Target app: Sports ranking app
# Primary: Rain blue — calm, technical, trustworthy
#
# This file overrides ONLY what differs from semantic.yaml defaults.
# Everything not listed here inherits from semantic.yaml.
#
# To apply this brand: merge this file over semantic.yaml in Style Dictionary.
# CSS output: --ptr-* variables scoped to [data-brand="raindrop"]
#
# COLOR SCHEME DEFAULT: light
#   Raindrop defaults to light mode. The bg, text, border, and status blocks
#   below set light values directly in the brand selector. Users who explicitly
#   set data-color-scheme="dark" get a separate selector block generated by
#   style-dictionary.config.js (brand.raindrop.dark.css).
# =============================================================================

meta:
  brand: { value: 'raindrop', comment: 'Brand identifier' }
  primary: { value: 'rain-blue', comment: 'Primary accent' }
  tone: { value: 'technical', comment: 'Sharp, data-dense, analytical' }

# ---------------------------------------------------------------------------
# COLOR — brand overrides + light mode defaults (merged into one block)
# ---------------------------------------------------------------------------

color:
  # Brand colors
  brand:
    primary:
      { value: '{color.rain.600}', comment: 'Rain blue #3d6ea8 — buttons, links, focus rings' }
    primary-mid: { value: '{color.rain.400}', comment: 'Rain mid #7B9FD4 — hover states, icons' }
    primary-light:
      { value: '{color.rain.200}', comment: 'Rain light #b0c8e8 — tinted backgrounds, badges' }
    primary-tint:
      { value: '{color.rain.50}', comment: 'Rain tint — light mode ghost hover, icon wraps' }
    primary-text:
      { value: '{color.rain.600}', comment: 'Rain primary — text on light tint backgrounds' }

    # Gradient mark — used in logo, loading bar, focus indicators
    gradient-from: { value: '{color.rain.600}', comment: 'Gradient start  oklch(46% 0.12 240)' }
    gradient-to: { value: '{color.rain.400}', comment: 'Gradient end oklch(65% 0.11 240)' }
    gradient:
      {
        value: 'linear-gradient(135deg, oklch(46% 0.12 240), oklch(65% 0.11 240))',
        comment: 'Raindrop brand gradient',
      }

  # Light mode defaults — Raindrop is light by default
  # Values match light.css exactly — single source of truth for light colors
  bg:
    page: { value: 'oklch(98% 0.01 80)', comment: 'Light page background — Raindrop default' }
    surface: { value: 'oklch(96% 0.01 80)', comment: 'Light surface' }
    elevated: { value: 'oklch(93% 0.02 80)', comment: 'Light elevated' }
    input: { value: 'oklch(96% 0.01 80)', comment: 'Light input background' }

  text:
    primary: { value: 'oklch(22% 0.02 80)', comment: 'Dark text on light background' }
    secondary: { value: 'oklch(38% 0.02 80)', comment: 'Secondary text' }
    tertiary: { value: 'oklch(72% 0.02 80)', comment: 'Placeholder, disabled' }

  border:
    subtle: { value: 'oklch(88% 0.02 80)', comment: 'Light subtle border' }
    default: { value: 'oklch(80% 0.02 80)', comment: 'Light default border' }
    strong: { value: 'oklch(65% 0.02 80)', comment: 'Light strong border' }

  status:
    info:
      bg: { value: 'oklch(94% 0.03 240)', comment: 'Info bg — light mode' }
      text: { value: 'oklch(46% 0.12 240)', comment: 'Info text — light mode' }
      tint: { value: 'oklch(94% 0.03 240)', comment: 'Info tint — light mode' }
      border: { value: 'oklch(46% 0.12 240)', comment: 'Info border — light mode' }
    success:
      bg: { value: 'oklch(94% 0.03 175)', comment: 'Success bg — light mode' }
      text: { value: 'oklch(46% 0.1 175)', comment: 'Success text — light mode' }
      tint: { value: 'oklch(94% 0.03 175)', comment: 'Success tint — light mode' }
      border: { value: 'oklch(46% 0.1 175)', comment: 'Success border — light mode' }
    warning:
      bg: { value: 'oklch(95% 0.04 90)', comment: 'Warning bg — light mode' }
      text: { value: 'oklch(52% 0.12 90)', comment: 'Warning text — light mode' }
      tint: { value: 'oklch(95% 0.04 90)', comment: 'Warning tint — light mode' }
      border: { value: 'oklch(52% 0.12 90)', comment: 'Warning border — light mode' }
    error:
      bg: { value: 'oklch(93% 0.02 25)', comment: 'Error bg — light mode, red.50' }
      text: { value: 'oklch(40% 0.13 25)', comment: 'Error text — light mode, red.600' }
      tint: { value: 'oklch(93% 0.02 25)', comment: 'Error tint — light mode, red.50' }
      border: { value: 'oklch(40% 0.13 25)', comment: 'Error border — light mode, red.600' }
    danger:
      bg: { value: 'oklch(93% 0.02 25)', comment: 'Danger bg — light mode, red.50' }
      text: { value: 'oklch(40% 0.13 25)', comment: 'Danger text — light mode, red.600' }
      tint: { value: 'oklch(93% 0.02 25)', comment: 'Danger tint — light mode, red.50' }
      border: { value: 'oklch(40% 0.13 25)', comment: 'Danger border — light mode, red.600' }

# ---------------------------------------------------------------------------
# TYPOGRAPHY OVERRIDES
# ---------------------------------------------------------------------------

typography:
  font:
    ui: { value: '{typography.family.sans-ui}', comment: 'Inter — Google Fonts' }
    display:
      {
        value: '{typography.family.sans-ui}',
        comment: 'Inter — same as UI, no separate display font',
      }

  size:
    xs: { value: '{typography.size-125.xs}', comment: '10px — 1.25 scale' }
    sm: { value: '{typography.size-125.sm}', comment: '13px' }
    base: { value: '{typography.size-125.base}', comment: '16px' }
    md: { value: '{typography.size-125.md}', comment: '20px' }
    lg: { value: '{typography.size-125.lg}', comment: '25px' }
    xl: { value: '{typography.size-125.xl}', comment: '31px' }
    2xl: { value: '{typography.size-125.2xl}', comment: '39px' }
    3xl: { value: '{typography.size-125.3xl}', comment: '49px' }

  # Inter-specific: tabular numerals for leaderboard alignment
  features:
    numeric:
      { value: "'tnum', 'cv11'", comment: 'Tabular numerals — column-aligned ranking numbers' }

# ---------------------------------------------------------------------------
# RADIUS OVERRIDES — sharp, technical
# ---------------------------------------------------------------------------

radius:
  component:
    button: { value: '{border-radius.sm}', comment: '2px — sharp, engineered' }
    input: { value: '{border-radius.sm}', comment: '2px' }
    card: { value: '{border-radius.md}', comment: '4px' }
    modal: { value: '{border-radius.md}', comment: '4px' }
    badge: { value: '{border-radius.sm}', comment: '2px — rectangular badges' }
    tooltip: { value: '{border-radius.sm}', comment: '2px' }
