name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens first
        run: pnpm --filter @petrichor/tokens build

      - name: Audit tokens
        run: node scripts/token-audit.js

      - name: Validate AI contracts
        run: |
          python3 -c "
          import yaml, sys, pathlib
          failed = []
          for f in pathlib.Path('packages/react/src').rglob('*.ai.yaml'):
            try:
              yaml.safe_load(f.read_text())
            except yaml.YAMLError as e:
              print(f'FAIL: {f}: {e}')
              failed.append(f)
          sys.exit(len(failed))
          "

      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Check formatting
        run: pnpm format:check
