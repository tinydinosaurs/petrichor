name: Build & Validate Tokens

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build --workspace=packages/tokens

      - name: Validate output
        run: npm run validate --workspace=packages/tokens
